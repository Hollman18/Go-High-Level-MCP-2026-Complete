services:
  ghl-mcp:
    build: .
    env_file:
      - .env
    environment:
      MCP_SERVER_PORT: "8000"
      GHL_TOOL_PROFILE: "${GHL_TOOL_PROFILE:-curated}"
    ports:
      - "127.0.0.1:8000:8000"
    labels:
      - "traefik.enable=${TRAEFIK_ENABLE:-false}"
      - "traefik.http.routers.ghl-mcp.rule=Host(`${MCP_DOMAIN:-localhost}`)"
      - "traefik.http.routers.ghl-mcp.entrypoints=websecure"
      - "traefik.http.routers.ghl-mcp.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.services.ghl-mcp.loadbalancer.server.port=8000"
    restart: unless-stopped
